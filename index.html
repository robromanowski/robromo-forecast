<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>US Weather Forecast</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app">
    <header id="header">
      <div id="header-left">
        <h1>US Weather</h1>
        <span id="forecast-label">14-Day Temperature Forecast</span>
      </div>
      <div id="header-right">
        <div id="model-toggle">
          <button class="model-btn active" data-model="both">Both</button>
          <button class="model-btn" data-model="gfs">GFS</button>
          <button class="model-btn" data-model="ecmwf">Euro</button>
        </div>
        <div id="unit-toggle">
          <button class="unit-btn active" data-unit="F">°F</button>
          <button class="unit-btn" data-unit="C">°C</button>
        </div>
      </div>
    </header>

    <div id="main">
      <div id="map-panel">
        <div id="map"></div>
        <div id="time-display">
          <span id="current-time-local">—</span>
          <span id="current-time-z">—</span>
          <span id="map-model-label" style="font-size:10px;color:#8b949e;margin-top:3px;display:block"></span>
          <span id="model-run-age" style="font-size:10px;color:#8b949e;margin-top:2px;display:block"></span>
        </div>
        <div id="map-legend">
          <canvas id="legend-canvas" width="160" height="10"></canvas>
          <div id="map-legend-labels">
            <span id="legend-min"></span>
            <span id="legend-mid"></span>
            <span id="legend-max"></span>
          </div>
        </div>
      </div>

      <div id="chart-panel">
        <div id="location-header">
          <span id="selected-location">Click a location on the map</span>
          <div id="location-header-right">
            <span id="peak-label"></span>
            <button id="temp-bg-btn" class="panel-size-btn" title="Toggle temperature background"><i data-lucide="palette"></i></button>
            <div id="panel-size-btns">
              <button class="panel-size-btn active" data-width="600" title="Normal width"><i data-lucide="panel-right"></i></button>
              <button class="panel-size-btn" data-width="1200" title="Wide"><i data-lucide="maximize-2"></i></button>
            </div>
          </div>
        </div>
        <div id="chart-container">
          <canvas id="temp-chart"></canvas>
        </div>
        <div id="model-confidence">
          <div id="confidence-segments">
            <div class="conf-seg" style="flex:3">
              <div class="conf-bar" style="background:#3fb950"></div>
              <span>Days 1–3</span>
            </div>
            <div class="conf-seg" style="flex:4">
              <div class="conf-bar" style="background:#d29922"></div>
              <span>Days 4–7</span>
            </div>
            <div class="conf-seg" style="flex:3">
              <div class="conf-bar" style="background:#f07830"></div>
              <span>Days 8–10</span>
            </div>
            <div class="conf-seg" style="flex:4">
              <div class="conf-bar" style="background:#f85149"></div>
              <span>Days 11–14</span>
            </div>
          </div>
          <div id="model-advice"></div>
        </div>
      </div>
    </div>

    <div id="timeline-panel">
      <div id="tl-controls">
        <button id="step-back" title="Step back 1 hour"><i data-lucide="skip-back"></i></button>
        <button id="play-btn" title="Play / Pause"><i data-lucide="play"></i></button>
        <button id="step-fwd" title="Step forward 1 hour"><i data-lucide="skip-forward"></i></button>
        <div id="speed-btns">
          <button class="speed-btn" data-speed="0.5">½×</button>
          <button class="speed-btn active" data-speed="1">1×</button>
          <button class="speed-btn" data-speed="2">2×</button>
          <button class="speed-btn" data-speed="4">4×</button>
        </div>
        <span id="timeline-readout"></span>
      </div>
      <div id="timeline-wrapper">
        <input type="range" id="timeline" min="0" max="335" value="0" step="1">
        <div id="timeline-ticks"></div>
      </div>
    </div>
  </div>

  <div id="loading">
    <div id="loading-inner">
      <div class="spinner"></div>
      <p>Loading forecast data…</p>
      <p id="loading-status"></p>
    </div>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/topojson-client@3/dist/topojson-client.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
